<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" color="#f0f4f8">
  <style>
    svg { color: #f0f4f8; }
    .bg { fill: #0b0f14; }
    @media (prefers-color-scheme: light) {
      svg { color: #0d1828; }
      .bg { fill: #eef2f7; }
    }
  </style>

  <rect class="bg" width="32" height="32" rx="7" />

  <!-- Arrow → right (matches reference favicon) -->
  <g fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="miter">
    <path fill="currentColor" stroke="none" d="M25 8 L19.5 5.2 L19.5 10.8 Z" />
    <g fill="none" stroke-width="1.45">
      <line x1="19.5" y1="8" x2="7" y2="8" />
      <line x1="7" y1="8" x2="4.5" y2="5.5" />
      <line x1="7" y1="8" x2="4.5" y2="10.5" />
      <line x1="7" y1="8" x2="2" y2="8" />
    </g>
  </g>

  <!-- EX -->
  <text
    x="5"
    y="27.5"
    fill="currentColor"
    font-family="Syne, system-ui, sans-serif"
    font-weight="700"
    font-size="15.5"
    letter-spacing="0.02em"
  >
    E
  </text>

  <g fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round">
    <g transform="translate(18, 15.2)">
      <line x1="1" y1="1" x2="8.5" y2="12.5" />
      <line x1="12.5" y1="1" x2="5" y2="12.5" />
      <line x1="1" y1="12.5" x2="8.5" y2="1" />
      <line x1="12.5" y1="12.5" x2="5" y2="1" />
    </g>
  </g>
</svg>
