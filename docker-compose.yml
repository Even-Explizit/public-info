# Offentlig site — én container (nginx + statisk build)
#   docker compose up -d --build
#   http://localhost:8080

services:
  public-site:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
    image: explizit-public-site:latest
    container_name: explizit-public-site
    ports:
      - "8080:80"
    restart: unless-stopped
