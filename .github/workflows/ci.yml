name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-explizit
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build static site
        run: |
          npm run build
        env:
          PUBLIC_URL: https://explizit.no
          CI: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy_pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  docker_image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag explizit-public-site:latest
